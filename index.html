<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <article class="card" data-testid="test-todo-card">
    <div class="bar" data-testid="test-todo-priority-indicator"></div>

    <div class="top">
      <label><input type="checkbox" data-testid="test-todo-complete-toggle" id="check"> Done</label>

      <select data-testid="test-todo-status-control" id="statusControl" aria-label="Task status">
        <option>Pending</option>
        <option selected>In Progress</option>
        <option>Done</option>
      </select>
    </div>

    <div data-testid="test-todo-edit-form" id="editForm">
      <div id="viewMode">
        <h2 data-testid="test-todo-title" id="title"></h2>

        <div data-testid="test-todo-collapsible-section" id="collapse" class="collapse">
          <p data-testid="test-todo-description" id="desc"></p>
        </div>

        <button data-testid="test-todo-expand-toggle" id="toggle" class="link" type="button" aria-expanded="false" aria-controls="collapse">Show more</button>

        <div class="row">
          <span data-testid="test-todo-priority" id="priority" class="pill"></span>
          <span data-testid="test-todo-status" id="status" class="pill"></span>
          <span data-testid="test-todo-overdue-indicator" id="overdue" class="pill red hide">Overdue</span>
        </div>

        <time data-testid="test-todo-due-date" id="due"></time>
        <p data-testid="test-todo-time-remaining" id="remaining" aria-live="polite"></p>
      </div>

      <div id="editMode" class="hide">
        <label>Title
          <input data-testid="test-todo-edit-title-input" id="editTitle">
        </label>

        <label>Description
          <textarea data-testid="test-todo-edit-description-input" id="editDesc"></textarea>
        </label>

        <label>Priority
          <select data-testid="test-todo-edit-priority-select" id="editPriority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </label>

        <label>Due date
          <input type="datetime-local" data-testid="test-todo-edit-due-date-input" id="editDue">
        </label>
      </div>
    </div>

    <ul data-testid="test-todo-tags" class="tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
      <li>design</li>
    </ul>

    <div class="actions">
      <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
      <button data-testid="test-todo-save-button" id="saveBtn" class="hide">Save</button>
      <button data-testid="test-todo-cancel-button" id="cancelBtn" class="hide">Cancel</button>
      <button data-testid="test-todo-delete-button" id="delBtn" class="danger">Delete</button>
    </div>
  </article>

  <script src="script.js"></script>
</body>
</html>
