<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <article data-testid="test-todo-card" class="card">
    <label>
      <input type="checkbox" data-testid="test-todo-complete-toggle" id="check">
      Done
    </label>

    <h2 data-testid="test-todo-title" id="title">Finish landing page</h2>
    <p data-testid="test-todo-description">Fix spacing, update copy, and send for review.</p>

    <div>
      <span data-testid="test-todo-priority" class="pill red">High</span>
      <span data-testid="test-todo-status" class="pill blue" id="status">Pending</span>
    </div>

    <time data-testid="test-todo-due-date" id="due" datetime="2026-03-01T18:00:00Z">
      Due Mar 1, 2026
    </time>
    <p data-testid="test-todo-time-remaining" id="remaining">...</p>


    <div class="actions">
      <button data-testid="test-todo-edit-button">Edit</button>
      <button data-testid="test-todo-delete-button">Delete</button>
    </div>
  </article>

  <script src="script.js"></script>
</body>
</html>
